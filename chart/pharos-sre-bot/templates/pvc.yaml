{{- if and .Values.qdrant.enabled .Values.qdrant.persistence.enabled (not .Values.qdrant.persistence.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "pharos-sre-bot.fullname" . }}-qdrant
  labels:
    {{- include "pharos-sre-bot.labels" . | nindent 4 }}
spec:
  accessModes:
    {{- toYaml .Values.qdrant.persistence.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.qdrant.persistence.size | quote }}
  {{- if .Values.qdrant.persistence.storageClassName }}
  storageClassName: {{ .Values.qdrant.persistence.storageClassName | quote }}
  {{- end }}
{{- end }}
