name: Build and Push Pharos SRE Bot

on:
  push:
    branches: [main, 'feature/**']
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE: ${{ github.repository }}

jobs:
  # test:
  #   if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-tests') }}
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4

  #     - name: Install uv
  #       uses: astral-sh/setup-uv@v5
  #       with:
  #         enable-cache: true

  #     - name: Set up Python
  #       run: uv python install 3.12

  #     - name: Install dependencies
  #       run: uv sync --frozen --dev

  #     - name: Import smoke test
  #       run: uv run python -c "import troubleshooting_agent.api, troubleshooting_agent.agent"

  #     - name: Run tests
  #       run: |
  #         # pytest exits 5 when no tests are collected — treat that as success
  #         # until the suite exists; any real failure still fails the job.
  #         uv run pytest -q || { code=$?; [ "$code" -eq 5 ] && echo "no tests collected yet" || exit "$code"; }

  build-and-push:
    needs: [test]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
